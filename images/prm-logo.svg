<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" role="img" aria-label="Power Remodeling Texas">
  <title>Power Remodeling Texas</title>

  <!-- STAR — thin outline, geometric Texas cue. Five-pointed, outer radius 34, centered at (112, 108). -->
  <g transform="translate(112 108)">
    <path d="M 0,-34 L 9.98,-10.51 L 32.34,-10.51 L 14.17,4.01 L 20.00,27.49 L 0,13.60 L -20.00,27.49 L -14.17,4.01 L -32.34,-10.51 L -9.98,-10.51 Z"
          fill="none" stroke="#000000" stroke-width="3" stroke-linejoin="miter" stroke-miterlimit="4"/>
  </g>

  <!-- POWER — dominant wordmark. Barlow Condensed Black, 148px. -->
  <text x="168" y="148"
        fill="#000000"
        font-family="'Barlow Condensed', 'Oswald', 'Impact', 'Arial Narrow', sans-serif"
        font-weight="900"
        font-stretch="condensed"
        font-size="148"
        letter-spacing="-2"
        text-anchor="start">POWER</text>

  <!-- Datum rule — thin horizontal line binding POWER to caption. -->
  <line x1="168" y1="170" x2="712" y2="170"
        stroke="#000000" stroke-width="1.5"/>

  <!-- REMODELING · TEXAS — caption, wide-tracked. -->
  <text x="168" y="200"
        fill="#000000"
        font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
        font-weight="500"
        font-size="22"
        letter-spacing="8"
        text-anchor="start">REMODELING  ·  TEXAS</text>

</svg>
